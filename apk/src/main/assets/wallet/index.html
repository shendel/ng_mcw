<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet UI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 16px;
        }
        .network {
            background: #627EEA;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .account {
            background: #333;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .address {
            font-family: monospace;
            font-size: 14px;
            color: #627EEA;
            word-break: break-all;
        }
        .balance {
            font-size: 24px;
            font-weight: bold;
            margin: 8px 0;
        }
        .btn {
            background: #627EEA;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn:active { background: #4a69d6; }
        .hidden { display: none !important; }
        #confirmationModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #2a2a4e;
            padding: 20px;
            border-radius: 12px;
            max-width: 90%;
            width: 400px;
        }
        .modal h3 { margin-top: 0; }
        .modal pre {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 11px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-approve { background: #16c79a; color: #000; }
        .btn-reject { background: #e54545; color: #fff; }
    </style>
</head>
<body>
<div class="header">
    <div>🔐 Android Wallet</div>
    <div class="network" id="networkBadge" onclick="WalletAPI.switchNetwork()">Ethereum</div>
</div>

<div class="account">
    <div>Active Account</div>
    <div class="address" id="activeAddress">0xf39F...92266</div>
    <div class="balance">0.01 ETH</div>
</div>

<button class="btn" onclick="WalletAPI.copyAddress()">📋 Copy Address</button>
<button class="btn" onclick="WalletAPI.showAccounts()">👥 Switch Account</button>
<button class="btn" onclick="WalletAPI.showNetworks()">🌐 Switch Network</button>
<button class="btn" onclick="WalletAPI.exportKey()">🔑 Export Private Key</button>

<!-- Модальное окно подтверждения -->
<div id="confirmationModal" class="hidden">
    <div class="modal">
        <h3 id="modalTitle">Confirm Action</h3>
        <pre id="modalDetails"></pre>
        <div class="modal-buttons">
            <button class="btn-reject" onclick="WalletAPI.reject()">Reject</button>
            <button class="btn-approve" onclick="WalletAPI.approve()">Approve</button>
        </div>
    </div>
</div>

<script src="wallet.js"></script>
</body>
</html>
